<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiadás 2026 Elite Pro</title>
    <style>
        :root { 
            --bg: #000000; 
            --glass: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(135deg, #0a84ff 0%, #5e5ce6 100%);
            --text: #ffffff; 
            --gray: #8e8e93; 
            --red: #ff453a; 
            --success: #30d158; 
            --weekend: rgba(255, 69, 58, 0.1);
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 12px; 
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            max-width: 450px; 
            margin: auto; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 30px; 
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        #user-info { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 15px; }
        
        /* Felső információs panelek */
        .finance-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .fin-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px 5px; border-radius: 16px; text-align: center; }
        .fin-card small { font-size: 10px; color: var(--gray); display: block; margin-bottom: 4px; font-weight: 600; }
        .fin-card span { font-size: 15px; font-weight: 800; }
        .fin-card input { width: 90%; background: transparent; border: none; color: #fff; text-align: center; font-size: 15px; font-weight: 800; outline: none; }

        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-btn { background: rgba(255,255,255,0.08); border: none; color: white; width: 38px; height: 38px; border-radius: 12px; cursor: pointer; font-size: 16px; }

        /* Naptár design */
        table { width: 100%; border-spacing: 5px; table-layout: fixed; }
        th { color: var(--gray); font-size: 11px; padding-bottom: 6px; font-weight: 700; text-align: center; }
        td { 
            text-align: center; padding: 14px 0; 
            background: rgba(255,255,255,0.02); 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 15px; 
            border: 1px solid transparent;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .weekend-cell { color: var(--red); background: var(--weekend); }
        
        /* 3D Kiemelkedés a mai napnak */
        .today-cell { 
            background: #1c1c1e !important;
            border: 1px solid rgba(10, 132, 255, 0.5) !important;
            color: #0a84ff !important;
            box-shadow:   -4px -4px 10px rgba(255,255,255,0.05), 
                           4px 4px 10px rgba(0,0,0,0.7),
                           inset 2px 2px 4px rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        
        .has-expense::after { 
            content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: var(--success); border-radius: 50%;
        }

        .selected-cell { border: 1px solid #ffffff !important; background: rgba(255,255,255,0.1); }

        /* Alsó lista és gombok */
        .main-btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; background: rgba(255,255,255,0.05); color: white; 
            border: 1px solid var(--border); padding: 15px; border-radius: 16px; 
            font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 15px;
        }
        .accent-btn { background: var(--accent); border: none; }

        .detail-row { 
            background: rgba(255,255,255,0.02); padding: 12px; border-radius: 14px; 
            margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid var(--border); font-size: 14px;
        }

        /* Új kiadás Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1c1c1e; padding: 22px; border-radius: 28px; width: 100%; max-width: 380px; border: 1px solid var(--border); box-sizing: border-box; }
        .modal h3 { margin: 0 0 15px 0; font-size: 20px; text-align: center; }
        .modal input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            padding: 14px; border-radius: 14px; color: #fff; font-size: 16px; box-sizing: border-box; 
            outline: none; margin-bottom: 12px; text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading-overlay">Szinkronizálás...</div>

<div id="login-screen">
    <div class="container" style="border:none; background:transparent; margin-top: 60px; text-align: center;">
        <h2 style="font-size: 32px; margin-bottom:30px">Kiadás Elite</h2>
        <input type="text" id="login-user" placeholder="Név" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:15px; border-radius:16px; color:#fff; font-size:18px; text-align:center; margin-bottom:12px; box-sizing:border-box; outline:none;">
        <input type="password" id="login-pass" placeholder="Jelszó" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:15px; border-radius:16px; color:#fff; font-size:18px; text-align:center; margin-bottom:25px; box-sizing:border-box; outline:none;">
        <button class="main-btn accent-btn" style="margin-top:0" onclick="handleLogin()">BELÉPÉS</button>
    </div>
</div>

<div id="app-content" class="container hidden">
    <div id="user-info"></div>
    
    <!-- Pénzügyi Áttekintés kártyák -->
    <div class="finance-grid">
        <div class="fin-card">
            <small>BEVÉTEL</small>
            <input type="text" id="income-input" placeholder="0 Ft" onchange="saveIncome()" oninput="formatAmount(this)">
        </div>
        <div class="fin-card">
            <small>KIADÁS</small>
            <span id="total-expense-field" style="color:var(--red)">0 Ft</span>
        </div>
        <div class="fin-card">
            <small>MARADÉK</small>
            <span id="balance-field">0 Ft</span>
        </div>
    </div>

    <!-- Hónap léptető -->
    <div class="nav-row">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div id="month-name" style="font-weight:800; font-size:19px; letter-spacing:-0.5px"></div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>

    <!-- Fő Naptár -->
    <div id="calendar-container"></div>
    
    <!-- Kiválasztott nap adatai és kezelése -->
    <div id="day-details-area" style="margin-top: 20px; display: none;">
        <h4 id="selected-day-title" style="margin: 0 0 10px 0; font-size: 16px; color: #0a84ff;"></h4>
        <div id="day-expenses-list"></div>
        <button class="main-btn accent-btn" style="margin-top: 5px; padding: 12px;" onclick="openAddModal()">➕ KIADÁS HOZZÁADÁSA</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
        <button class="main-btn" style="margin-top:0; padding:12px;" onclick="openStats()">📊 STATS</button>
        <button id="admin-panel-btn" class="main-btn" style="margin-top:0; padding:12px; color: #5856d6; display:none" onclick="openModal('admin-modal')">👤 +USER</button>
    </div>
    <button class="main-btn" style="background:none; color:var(--red); border:none; font-size:12px; margin-top:10px; padding:5px;" onclick="logout()">Kijelentkezés</button>
</div>

<!-- Új kiadás hozzáadása felugró -->
<div id="add-expense-modal" class="modal"><div class="modal-content">
    <h3 id="modal-date-title">Új tétel</h3>
    <input type="text" id="modal-amount" placeholder="Összeg (Ft)" oninput="formatAmount(this)" inputmode="numeric">
    <input type="text" id="modal-memo" placeholder="Megnevezés (pl. Tesco, Tankolás)">
    <button class="main-btn accent-btn" onclick="saveExpenseClick()">MENTÉS</button>
    <button class="main-btn" style="background:none; border:none; margin-top:5px;" onclick="closeModal('add-expense-modal')">Mégse</button>
</div></div>

<!-- Stats és Admin Modalok változatlanul funkcionálisak -->
<div id="stats-modal" class="modal"><div class="modal-content">
    <h3 style="margin-top:0">Összesítés</h3>
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button id="tab-week" class="tab-btn active" style="flex:1; padding:8px; border-radius:10px; color:#fff;" onclick="renderStats('week')">Heti</button>
        <button id="tab-month" class="tab-btn" style="flex:1; padding:8px; border-radius:10px; color:#fff;" onclick="renderStats('month')">Havi</button>
    </div>
    <div id="stats-container" style="max-height:50vh; overflow-y:auto;"></div>
    <button class="main-btn" style="margin-top:15px;" onclick="closeModal('stats-modal')">Bezárás</button>
</div></div>

<div id="admin-modal" class="modal"><div class="modal-content">
    <h3>Új felhasználó</h3>
    <input type="text" id="new-user-name" placeholder="Név">
    <input type="text" id="new-user-pass" placeholder="Jelszó">
    <button class="main-btn accent-btn" onclick="addUser()">LÉTREHOZÁS</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('admin-modal')">Mégse</button>
</div></div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseiocom/"; 
    const REAL_DB_URL = DB_URL.replace('firebaseiocom', 'firebaseio.com');
    
    let currentUser = JSON.parse(localStorage.getItem('kiadas_session'));
    let expenses = [];
    let monthlyIncomes = {};
    let d = new Date(); 
    let selectedDayGlobal = null;

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return;
        showLoading(true);
        try {
            const res = await fetch(`${REAL_DB_URL}users_auth/${u}.json`);
            let stored = await res.json();
            if (stored && String(stored).replace(/"/g, '') === String(p)) {
                currentUser = { name: u, isAdmin: (u.toLowerCase() === 'jani') };
                localStorage.setItem('kiadas_session', JSON.stringify(currentUser));
                initApp();
            } else { alert("Hibás adatok!"); }
        } catch (e) { alert("Szerver hiba!"); }
        showLoading(false);
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('user-info').innerText = `Üdv, ${currentUser.name}`;
        if(currentUser.isAdmin) document.getElementById('admin-panel-btn').style.display = 'flex';
        loadData();
    }

    async function loadData() {
        try {
            // Kiadások betöltése
            const resExp = await fetch(`${REAL_DB_URL}expenses/${currentUser.name}.json`);
            const dataExp = await resExp.json();
            expenses = dataExp ? Object.keys(dataExp).map(k => ({...dataExp[k], fbKey: k})) : [];

            // Bevételek betöltése
            const resInc = await fetch(`${REAL_DB_URL}incomes/${currentUser.name}.json`);
            const dataInc = await resInc.json();
            monthlyIncomes = dataInc || {};

            renderCalendar();
            if(selectedDayGlobal) {
                showDayDetails(selectedDayGlobal);
            }
        } catch (e) { console.error("Adatbetöltési hiba"); }
    }

    function formatAmount(i) {
        let v = i.value.replace(/\D/g, "");
        if(!v) { i.value = ""; return; }
        i.value = parseInt(v).toLocaleString('hu-HU') + " Ft";
    }

    function getCurrentMonthKey() {
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    async function saveIncome() {
        const incStr = document.getElementById('income-input').value.replace(/\D/g, "");
        if(!incStr) return;
        const monthKey = getCurrentMonthKey();
        const val = parseInt(incStr);
        
        try {
            await fetch(`${REAL_DB_URL}incomes/${currentUser.name}/${monthKey}.json`, { method: 'PUT', body: JSON.stringify(val) });
            monthlyIncomes[monthKey] = val;
            calculateFinanceSummary();
        } catch(e) { alert("Sikertelen bevétel mentés!"); }
    }

    function calculateFinanceSummary() {
        const monthKey = getCurrentMonthKey();
        const income = monthlyIncomes[monthKey] || 0;
        document.getElementById('income-input').value = income ? income.toLocaleString('hu-HU') + " Ft" : "";

        const totalExpense = expenses.filter(e => e.dMonth === d.getMonth() && e.dYear === d.getFullYear())
                                     .reduce((s, i) => s + i.amt, 0);
        document.getElementById('total-expense-field').innerText = totalExpense.toLocaleString('hu-HU') + " Ft";

        const balance = income - totalExpense;
        const balField = document.getElementById('balance-field');
        balField.innerText = balance.toLocaleString('hu-HU') + " Ft";
        balField.style.color = balance >= 0 ? "var(--success)" : "var(--red)";
    }

    function renderCalendar() {
        const year = d.getFullYear(), month = d.getMonth();
        const mNames = ["Január", "Február", "Március", "Április", "Május", "Június", "Július", "Augusztus", "Szeptember", "Október", "November", "December"];
        document.getElementById('month-name').innerText = mNames[month] + " " + year;
        
        let firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
        let dayCount = new Date(year, month + 1, 0).getDate();
        
        let html = '<table><tr><th>H</th><th>K</th><th>SZ</th><th>CS</th><th>P</th><th>SZ</th><th>V</th></tr><tr>';
        for (let i = 0; i < firstDay; i++) html += '<td></td>';
        
        const now = new Date();
        for (let day = 1; day <= dayCount; day++) {
            if ((day + firstDay - 1) % 7 === 0 && day !== 1) html += '</tr><tr>';
            
            const isToday = (day === now.getDate() && month === now.getMonth() && year === now.getFullYear());
            const hasExp = expenses.some(e => e.dDay === day && e.dMonth === month && e.dYear === year);
            const isWeekend = ((day + firstDay - 1) % 7 >= 5);
            const isSelected = (selectedDayGlobal === day);
            
            let classes = [];
            if (isToday) classes.push('today-cell');
            if (hasExp) classes.push('has-expense');
            if (isWeekend) classes.push('weekend-cell');
            if (isSelected) classes.push('selected-cell');

            html += `<td class="${classes.join(' ')}" onclick="selectDay(${day})">${day}</td>`;
        }
        
        let totalCells = firstDay + dayCount;
        let missingCells = (7 - (totalCells % 7)) % 7;
        for (let i = 0; i < missingCells; i++) html += '<td></td>';
        
        document.getElementById('calendar-container').innerHTML = html + '</tr></table>';
        calculateFinanceSummary();
    }

    function selectDay(day) {
        selectedDayGlobal = day;
        renderCalendar();
        showDayDetails(day);
    }

    function showDayDetails(day) {
        document.getElementById('day-details-area').style.display = 'block';
        document.getElementById('selected-day-title').innerText = `${d.getFullYear()}. ${d.getMonth()+1}. ${day}. napi tételek:`;
        
        const list = document.getElementById('day-expenses-list');
        list.innerHTML = "";

        const filtered = expenses.filter(e => e.dDay === day && e.dMonth === d.getMonth() && e.dYear === d.getFullYear());
        
        if(filtered.length === 0) {
            list.innerHTML = "<p style='font-size:13px; color:var(--gray); margin:5px 0;'>Nincs rögzített kiadás ezen a napon.</p>";
        } else {
            filtered.forEach(item => {
                list.innerHTML += `
                <div class="detail-row">
                    <span><strong>${item.memo}</strong></span>
                    <div style="text-align:right">
                        <strong style="margin-right:10px;">${item.amt.toLocaleString('hu-HU')} Ft</strong>
                        <span style="color:var(--red); font-weight:bold; cursor:pointer;" onclick="deleteExp('${item.fbKey}')">✕</span>
                    </div>
                </div>`;
            });
        }
    }

    function openAddModal() {
        if(!selectedDayGlobal) return;
        document.getElementById('modal-date-title').innerText = `${d.getMonth()+1}. hó ${selectedDayGlobal}. - Új kiadás`;
        openModal('add-expense-modal');
    }

    async function saveExpenseClick() {
        const amtStr = document.getElementById('modal-amount').value.replace(/\D/g, "");
        const memo = document.getElementById('modal-memo').value.trim() || "Kiadás";

        if(!amtStr) { alert("Kérlek adj meg összeget!"); return; }

        const selectedDate = new Date(d.getFullYear(), d.getMonth(), selectedDayGlobal, 12, 0, 0);

        const item = { 
            amt: parseInt(amtStr), 
            memo: memo, 
            dDay: selectedDayGlobal, 
            dMonth: d.getMonth(), 
            dYear: d.getFullYear(), 
            date: selectedDate.toISOString() 
        };

        showLoading(true);
        try {
            await fetch(`${REAL_DB_URL}expenses/${currentUser.name}.json`, { method: 'POST', body: JSON.stringify(item) });
            document.getElementById('modal-amount').value = "";
            document.getElementById('modal-memo').value = "";
            closeModal('add-expense-modal');
            await loadData();
        } catch(e) { alert("Hiba a mentés során!"); }
        showLoading(false);
    }

    async function deleteExp(k) {
        if(confirm("Biztosan törlöd a tételt?")) {
            showLoading(true);
            try {
                await fetch(`${REAL_DB_URL}expenses/${currentUser.name}/${k}.json`, {method:'DELETE'});
                await loadData();
            } catch(e) { alert("Hiba a törlés során!"); }
            showLoading(false);
        }
    }

    function renderStats(mode) {
        document.getElementById('tab-week').classList.toggle('active', mode === 'week');
        document.getElementById('tab-month').classList.toggle('active', mode === 'month');
        const container = document.getElementById('stats-container');
        container.innerHTML = "";
        let report = {};

        expenses.forEach(e => {
            let key;
            if (mode === 'month') {
                key = `${e.dYear}. ${String(e.dMonth + 1).padStart(2, '0')}. hónap`;
            } else {
                const dt = new Date(e.date);
                const target = new Date(dt.valueOf());
                const dayNr = (dt.getDay() + 6) % 7;
                target.setDate(target.getDate() - dayNr + 3);
                const firstThursday = target.valueOf();
                target.setMonth(0, 1);
                if (target.getDay() !== 4) {
                    target.setMonth(0, 1 + ((4 - target.getDay() + 7) % 7));
                }
                const week = 1 + Math.ceil((firstThursday - target) / 604800000);
                key = `${e.dYear}. ${String(week).padStart(2, '0')}. hét`;
            }
            report[key] = (report[key] || 0) + e.amt;
        });

        const sortedKeys = Object.keys(report).sort().reverse();
        if(sortedKeys.length === 0) { container.innerHTML = "<p>Nincs adat.</p>"; return; }
        
        sortedKeys.forEach(k => {
            container.innerHTML += `
                <div class="detail-row">
                    <span>${k}</span>
                    <strong style="color:var(--success)">${report[k].toLocaleString('hu-HU')} Ft</strong>
                </div>`;
        });
    }

    function changeMonth(n) { 
        d.setMonth(d.getMonth() + n); 
        selectedDayGlobal = null; 
        document.getElementById('day-details-area').style.display = 'none';
        renderCalendar(); 
    }
    
    function openStats() { openModal('stats-modal'); renderStats('week'); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    function logout() { localStorage.removeItem('kiadas_session'); location.reload(); }

    async function addUser() {
        const n = document.getElementById('new-user-name').value.trim(), p = document.getElementById('new-user-pass').value.trim();
        if(!n || !p) return;
        showLoading(true);
        try {
            await fetch(`${REAL_DB_URL}users_auth/${n}.json`, { method: 'PUT', body: JSON.stringify(p) });
            alert("Felhasználó létrehozva!"); 
            document.getElementById('new-user-name').value = "";
            document.getElementById('new-user-pass').value = "";
            closeModal('admin-modal'); 
        } catch(e) { alert("Hiba történt!"); }
        showLoading(false);
    }

    if(currentUser) initApp();
</script>
</body>
</html>
