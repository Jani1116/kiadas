<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiadás 2026 PRO</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --text: #fff; --gray: #8e8e93; --red: #ff453a; --success: #30d158; --weekend: #2c0000; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 14px; -webkit-tap-highlight-color: transparent; }
        
        .container { max-width: 500px; margin: auto; background: #121212; padding: 20px; border-radius: 28px; border: 1px solid #2c2c2e; box-shadow: 0 20px 40px rgba(0,0,0,0.8); text-align: center; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        
        #user-info { font-size: 12px; color: var(--gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { margin: 0 0 25px 0; font-size: 32px; }

        .total-display { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #2c2c2e; margin-bottom: 20px; }
        .total-val { font-size: 32px; font-weight: bold; color: var(--success); }
        
        input { width: 100%; background: var(--card); border: 1px solid #2c2c2e; padding: 15px; border-radius: 14px; color: #fff; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; outline: none; text-align: center; }
        input:focus { border-color: var(--accent); }

        .main-btn { display: flex; align-items: center; justify-content: center; width: 100%; background: var(--card); color: white; border: 1px solid #2c2c2e; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); background: #2c2c2e; }
        .accent-btn { background: var(--accent); border: none; }
        #admin-panel-btn { background: #5856d6; border: none; display: none; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; border: 1px solid #2c2c2e; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 4px; }
        td { text-align: center; padding: 8px; background: #2c2c2e; border-radius: 8px; height: 40px; font-weight: bold; }
        .weekend-cell { background: var(--weekend) !important; color: var(--red); }
        .today-cell { border: 2px solid var(--accent) !important; }
        .has-expense::after { content: '●'; display: block; font-size: 8px; color: var(--success); }

        .detail-row { background: #1c1c1e; padding: 15px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); text-align: left; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading-overlay">Szinkronizálás...</div>

<div id="login-screen">
    <h2 style="margin-bottom:20px">Kiadás Belépés</h2>
    <div style="width:100%; max-width:300px">
        <input type="text" id="login-user" placeholder="Felhasználónév">
        <input type="password" id="login-pass" placeholder="Jelszó">
        <button class="main-btn accent-btn" onclick="handleLogin()">BELÉPÉS</button>
    </div>
</div>

<div id="app-content" class="container hidden">
    <div id="user-info"></div>
    <h1>Kiadások</h1>

    <div class="total-display">
        <small style="color:var(--gray)">ÖSSZES EGYENLEG</small><br>
        <span class="total-val" id="main-total">0 Ft</span>
    </div>

    <input type="text" id="amount-input" placeholder="0 Ft" oninput="formatAmount(this)" inputmode="numeric">
    
    <button class="main-btn accent-btn" onclick="openMemo()">➕ KIADÁS RÖGZÍTÉSE</button>
    <button class="main-btn" onclick="openCalendar()">📅 ÖSSZESÍTŐ NAPTÁR</button>
    <button id="admin-panel-btn" class="main-btn" onclick="openAdmin()">👤 ÚJ FELHASZNÁLÓ</button>
    
    <button class="main-btn" style="background:none; color:var(--red); border:none; margin-top:20px" onclick="logout()">Kijelentkezés</button>
</div>

<div id="memo-modal" class="modal"><div class="modal-content">
    <h3>Megjegyzés</h3>
    <input type="text" id="memo-input" placeholder="Mire költötted?" style="text-align:left">
    <button class="main-btn accent-btn" onclick="saveFinal()">MENTÉS</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('memo-modal')">Mégse</button>
</div></div>

<div id="calendar-modal" class="modal"><div class="modal-content" style="max-width:400px; width:90%">
    <h3 id="month-name" style="color:var(--accent); margin-top:0"></h3>
    <div id="calendar-container"></div>
    <div style="margin-top:20px; background:#000; padding:15px; border-radius:15px">
        <small style="color:var(--gray)">HAVI SZUMMA</small>
        <div id="monthly-total" style="font-size:22px; font-weight:bold; color:var(--success)">0 Ft</div>
    </div>
    <button class="main-btn" style="margin-top:15px" onclick="openDetails()">Részletek</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('calendar-modal')">Bezárás</button>
</div></div>

<div id="details-modal" class="modal"><div class="modal-content" style="max-width:400px; width:90%; max-height:80vh; overflow-y:auto">
    <h3>Napi bontás</h3>
    <div id="details-list"></div>
    <button class="main-btn" style="margin-top:15px" onclick="closeModal('details-modal')">Vissza</button>
</div></div>

<div id="admin-modal" class="modal"><div class="modal-content">
    <h3>Új felhasználó</h3>
    <input type="text" id="new-user-name" placeholder="Név">
    <input type="text" id="new-user-pass" placeholder="Jelszó">
    <button class="main-btn accent-btn" onclick="addUser()">LÉTREHOZÁS</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('admin-modal')">Mégse</button>
</div></div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('kiadas_session'));
    let expenses = [];
    let d = new Date();

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return;
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}users_auth/${u}.json`);
            let stored = await res.json();
            if (stored && String(stored).replace(/"/g, '') === String(p)) {
                currentUser = { name: u, isAdmin: (u.toLowerCase() === 'jani') };
                localStorage.setItem('kiadas_session', JSON.stringify(currentUser));
                initApp();
            } else { alert("Hibás adatok!"); }
        } catch (e) { alert("Hiba!"); }
        showLoading(false);
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('user-info').innerText = `Felhasználó: ${currentUser.name.toUpperCase()}`;
        if(currentUser.isAdmin) document.getElementById('admin-panel-btn').style.display = 'flex';
        loadData();
    }

    async function loadData() {
        const res = await fetch(`${DB_URL}expenses/${currentUser.name}.json`);
        const data = await res.json();
        expenses = data ? Object.keys(data).map(k => ({...data[k], fbKey: k})) : [];
        document.getElementById('main-total').innerText = expenses.reduce((s, i) => s + i.amt, 0).toLocaleString('hu-HU') + " Ft";
    }

    function formatAmount(i) {
        let v = i.value.replace(/\D/g, "");
        if(!v) { i.value = ""; return; }
        i.value = parseInt(v).toLocaleString('hu-HU') + " Ft";
        let pos = i.value.length - 3;
        i.setSelectionRange(pos, pos);
    }

    async function saveFinal() {
        const amt = parseInt(document.getElementById('amount-input').value.replace(/\D/g, ""));
        const memo = document.getElementById('memo-input').value || "Kiadás";
        const now = new Date();
        const item = { amt, memo, dDay: now.getDate(), dMonth: now.getMonth(), dYear: now.getFullYear(), date: now.toISOString() };
        showLoading(true);
        await fetch(`${DB_URL}expenses/${currentUser.name}.json`, { method: 'POST', body: JSON.stringify(item) });
        document.getElementById('amount-input').value = "";
        document.getElementById('memo-input').value = "";
        closeModal('memo-modal');
        await loadData();
        showLoading(false);
    }

    function renderCalendar() {
        const year = d.getFullYear(), month = d.getMonth();
        const mNames = ["Január", "Február", "Március", "Április", "Május", "Június", "Július", "Augusztus", "Szeptember", "Október", "November", "December"];
        document.getElementById('month-name').innerText = mNames[month] + " " + year;
        let firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
        let dayCount = new Date(year, month + 1, 0).getDate();
        let html = '<table><tr><th>H</th><th>K</th><th>Sz</th><th>Cs</th><th>P</th><th>Sz</th><th>V</th></tr><tr>';
        for (let i = 0; i < firstDay; i++) html += '<td></td>';
        for (let day = 1; day <= dayCount; day++) {
            if ((day + firstDay - 1) % 7 === 0 && day !== 1) html += '</tr><tr>';
            const isToday = (day === new Date().getDate() && month === new Date().getMonth());
            const hasExp = expenses.some(e => e.dDay === day && e.dMonth === month);
            html += `<td class="${isToday?'today-cell':''} ${hasExp?'has-expense':''}">${day}</td>`;
        }
        document.getElementById('calendar-container').innerHTML = html + '</tr></table>';
        const total = expenses.filter(e => e.dMonth === month).reduce((s, i) => s + i.amt, 0);
        document.getElementById('monthly-total').innerText = total.toLocaleString('hu-HU') + " Ft";
    }

    async function deleteExp(k) { if(confirm("Törlöd?")) { showLoading(true); await fetch(`${DB_URL}expenses/${currentUser.name}/${k}.json`, {method:'DELETE'}); await loadData(); openDetails(); renderCalendar(); showLoading(false); } }
    function openMemo() { if(!document.getElementById('amount-input').value) return; document.getElementById('memo-modal').style.display = 'flex'; }
    function openCalendar() { document.getElementById('calendar-modal').style.display = 'flex'; renderCalendar(); }
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    function logout() { localStorage.removeItem('kiadas_session'); location.reload(); }
    function openDetails() {
        const list = document.getElementById('details-list'); list.innerHTML = "";
        expenses.filter(e => e.dMonth === d.getMonth()).reverse().forEach(item => {
            list.innerHTML += `<div class="detail-row"><div><small>${item.dDay}.</small><br><strong>${item.memo}</strong></div><div>${item.amt.toLocaleString('hu-HU')} Ft <button style="color:var(--red); background:none; border:none; margin-left:10px" onclick="deleteExp('${item.fbKey}')">🗑</button></div></div>`;
        });
        document.getElementById('details-modal').style.display = 'flex';
    }
    async function addUser() {
        const n = document.getElementById('new-user-name').value, p = document.getElementById('new-user-pass').value;
        if(!n || !p) return;
        showLoading(true);
        await fetch(`${DB_URL}users_auth/${n}.json`, { method: 'PUT', body: JSON.stringify(p) });
        alert("Kész!"); closeModal('admin-modal'); showLoading(false);
    }
    if(currentUser) initApp();
</script>
</body>
</html>
