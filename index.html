<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiadás 2026 Elite</title>
    <style>
        :root { 
            --bg: #000000; 
            --glass: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: linear-gradient(135deg, #0a84ff 0%, #5e5ce6 100%);
            --text: #ffffff; 
            --gray: #8e8e93; 
            --red: #ff453a; 
            --success: #30d158; 
            --weekend: rgba(255, 69, 58, 0.15);
        }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            max-width: 450px; 
            margin: auto; 
            background: var(--glass); 
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 32px; 
            border: 1px solid var(--border);
            text-align: center;
        }

        #user-info { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        h1 { margin: 0 0 30px 0; font-weight: 800; font-size: 34px; letter-spacing: -1px; }

        /* Modern beviteli mező */
        .input-group { margin-bottom: 20px; }
        input { 
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 20px; 
            color: #fff; 
            font-size: 22px; 
            font-weight: 700;
            box-sizing: border-box; 
            outline: none; 
            text-align: center;
            transition: 0.3s;
        }
        input:focus { border-color: #0a84ff; background: rgba(255,255,255,0.08); }

        /* Új Gradiens Gombok */
        .main-btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            color: white; 
            border: 1px solid var(--border); 
            padding: 18px; 
            border-radius: 20px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-bottom: 12px; 
            transition: 0.2s; 
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.8; }
        .accent-btn { background: var(--accent); border: none; box-shadow: 0 10px 20px rgba(10, 132, 255, 0.3); }

        /* Naptár Design */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; padding: 20px 0; }
        .modal-content { background: #1c1c1e; padding: 25px; border-radius: 35px; width: 92%; max-width: 400px; border: 1px solid var(--border); margin: auto; }
        
        .nav-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 5px; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 12px; font-size: 18px; cursor: pointer; }

        table { width: 100%; border-spacing: 6px; }
        th { color: var(--gray); font-size: 11px; padding-bottom: 10px; text-transform: uppercase; }
        td { 
            text-align: center; padding: 12px 0; 
            background: rgba(255,255,255,0.03); 
            border-radius: 14px; 
            height: 48px; 
            font-weight: 600; 
            font-size: 15px; 
            position: relative; 
            border: 1px solid transparent;
        }
        .weekend-cell { color: var(--red); background: var(--weekend); }
        .today-cell { border: 2px solid #0a84ff !important; box-shadow: 0 0 15px rgba(10,132,255,0.4); }
        .has-expense::after { 
            content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success);
        }

        /* Lista nézet kártyái */
        .detail-row { 
            background: rgba(255,255,255,0.03); 
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid var(--border);
        }
        .sum-card { 
            margin-top: 20px; background: rgba(48, 209, 88, 0.1); 
            padding: 20px; border-radius: 22px; border: 1px solid rgba(48, 209, 88, 0.2); 
        }

        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading-overlay">Szinkronizálás...</div>

<div id="login-screen">
    <div class="container" style="border:none; background:transparent">
        <h2 style="font-size: 28px; margin-bottom:30px">Kiadás Elite</h2>
        <input type="text" id="login-user" placeholder="Név" style="font-size: 16px; margin-bottom:15px">
        <input type="password" id="login-pass" placeholder="Jelszó" style="font-size: 16px; margin-bottom:25px">
        <button class="main-btn accent-btn" onclick="handleLogin()">BELÉPÉS</button>
    </div>
</div>

<div id="app-content" class="container hidden">
    <div id="user-info"></div>
    <h1>Kiadások</h1>

    <div class="input-group">
        <input type="text" id="amount-input" placeholder="0 Ft" oninput="formatAmount(this)" inputmode="numeric">
    </div>
    
    <button class="main-btn accent-btn" onclick="openMemo()">➕ KIADÁS RÖGZÍTÉSE</button>
    <button class="main-btn" onclick="openCalendar()">📅 ÖSSZESÍTŐ NAPTÁR</button>
    <button id="admin-panel-btn" class="main-btn" style="color: #5856d6" onclick="openAdmin()">👤 ÚJ FELHASZNÁLÓ</button>
    
    <button class="main-btn" style="background:none; color:var(--red); border:none; margin-top:20px; font-size:13px" onclick="logout()">Kijelentkezés</button>
</div>

<div id="memo-modal" class="modal"><div class="modal-content">
    <h3 style="margin-top:0">Megjegyzés</h3>
    <input type="text" id="memo-input" placeholder="Mire költötted?" style="text-align:left; font-size: 16px">
    <button class="main-btn accent-btn" style="margin-top:20px" onclick="saveFinal()">MENTÉS</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('memo-modal')">Mégse</button>
</div></div>

<div id="calendar-modal" class="modal"><div class="modal-content">
    <div class="nav-row">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <div id="month-name" style="font-weight:800; font-size:18px"></div>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div id="calendar-container"></div>
    <div class="sum-card">
        <small style="color:var(--gray); text-transform:uppercase; font-weight:700">Havi összesen</small>
        <div id="monthly-total" style="font-size:26px; font-weight:800; color:var(--success); margin-top:5px">0 Ft</div>
    </div>
    <button class="main-btn" style="margin-top:20px; background: rgba(255,255,255,0.1)" onclick="openDetails()">RÉSZLETES LISTA</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('calendar-modal')">Bezárás</button>
</div></div>

<div id="details-modal" class="modal"><div class="modal-content" style="max-height:85vh">
    <h3 style="margin-top:0">Tranzakciók</h3>
    <div id="details-list"></div>
    <button class="main-btn" style="margin-top:15px" onclick="closeModal('details-modal')">Vissza</button>
</div></div>

<div id="admin-modal" class="modal"><div class="modal-content">
    <h3>Új felhasználó</h3>
    <input type="text" id="new-user-name" placeholder="Név" style="font-size:16px">
    <input type="text" id="new-user-pass" placeholder="Jelszó" style="font-size:16px">
    <button class="main-btn accent-btn" onclick="addUser()">LÉTREHOZÁS</button>
    <button class="main-btn" style="background:none; border:none" onclick="closeModal('admin-modal')">Mégse</button>
</div></div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/";
    let currentUser = JSON.parse(localStorage.getItem('kiadas_session'));
    let expenses = [];
    let d = new Date();

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return;
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}users_auth/${u}.json`);
            let stored = await res.json();
            if (stored && String(stored).replace(/"/g, '') === String(p)) {
                currentUser = { name: u, isAdmin: (u.toLowerCase() === 'jani') };
                localStorage.setItem('kiadas_session', JSON.stringify(currentUser));
                initApp();
            } else { alert("Hibás adatok!"); }
        } catch (e) { alert("Hiba!"); }
        showLoading(false);
    }

    function initApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
        document.getElementById('user-info').innerText = `${currentUser.name}`;
        if(currentUser.isAdmin) document.getElementById('admin-panel-btn').style.display = 'flex';
        loadData();
    }

    async function loadData() {
        const res = await fetch(`${DB_URL}expenses/${currentUser.name}.json`);
        const data = await res.json();
        expenses = data ? Object.keys(data).map(k => ({...data[k], fbKey: k})) : [];
    }

    function formatAmount(i) {
        let v = i.value.replace(/\D/g, "");
        if(!v) { i.value = ""; return; }
        i.value = parseInt(v).toLocaleString('hu-HU') + " Ft";
        let pos = i.value.length - 3;
        i.setSelectionRange(pos, pos);
    }

    async function saveFinal() {
        const amtStr = document.getElementById('amount-input').value.replace(/\D/g, "");
        if(!amtStr) return;
        const amt = parseInt(amtStr);
        const memo = document.getElementById('memo-input').value || "Kiadás";
        const now = new Date();
        const item = { amt, memo, dDay: now.getDate(), dMonth: now.getMonth(), dYear: now.getFullYear(), date: now.toISOString() };
        showLoading(true);
        await fetch(`${DB_URL}expenses/${currentUser.name}.json`, { method: 'POST', body: JSON.stringify(item) });
        document.getElementById('amount-input').value = "";
        document.getElementById('memo-input').value = "";
        closeModal('memo-modal');
        await loadData();
        showLoading(false);
    }

    function renderCalendar() {
        const year = d.getFullYear(), month = d.getMonth();
        const mNames = ["Január", "Február", "Március", "Április", "Május", "Június", "Július", "Augusztus", "Szeptember", "Október", "November", "December"];
        document.getElementById('month-name').innerText = mNames[month] + " " + year;
        let firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
        let dayCount = new Date(year, month + 1, 0).getDate();
        let html = '<table><tr><th>H</th><th>K</th><th>Sz</th><th>Cs</th><th>P</th><th>Sz</th><th>V</th></tr><tr>';
        for (let i = 0; i < firstDay; i++) html += '<td></td>';
        for (let day = 1; day <= dayCount; day++) {
            if ((day + firstDay - 1) % 7 === 0 && day !== 1) html += '</tr><tr>';
            const isToday = (day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear());
            const hasExp = expenses.some(e => e.dDay === day && e.dMonth === month && e.dYear === year);
            const isWeekend = ((day + firstDay - 1) % 7 >= 5);
            html += `<td class="${isToday?'today-cell':''} ${hasExp?'has-expense':''} ${isWeekend?'weekend-cell':''}">${day}</td>`;
        }
        document.getElementById('calendar-container').innerHTML = html + '</tr></table>';
        const total = expenses.filter(e => e.dMonth === month && e.dYear === year).reduce((s, i) => s + i.amt, 0);
        document.getElementById('monthly-total').innerText = total.toLocaleString('hu-HU') + " Ft";
    }

    function changeMonth(n) { d.setMonth(d.getMonth() + n); renderCalendar(); }
    function openMemo() { if(!document.getElementById('amount-input').value) return; document.getElementById('memo-modal').style.display = 'flex'; }
    function openCalendar() { document.getElementById('calendar-modal').style.display = 'block'; renderCalendar(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    function logout() { localStorage.removeItem('kiadas_session'); location.reload(); }

    function openDetails() {
        const list = document.getElementById('details-list'); list.innerHTML = "";
        const filtered = expenses.filter(e => e.dMonth === d.getMonth() && e.dYear === d.getFullYear()).reverse();
        if(filtered.length === 0) { list.innerHTML = "<p style='color:var(--gray)'>Nincs rögzített adat.</p>"; }
        else {
            filtered.forEach(item => {
                list.innerHTML += `<div class="detail-row"><div><small style="color:var(--accent)">${item.dDay}.</small><br><strong style="font-size:16px">${item.memo}</strong></div><div style="text-align:right"><strong>${item.amt.toLocaleString('hu-HU')} Ft</strong><br><button style="color:var(--red); background:none; border:none; margin-top:5px; font-size:11px" onclick="deleteExp('${item.fbKey}')">Törlés</button></div></div>`;
            });
        }
        document.getElementById('details-modal').style.display = 'block';
    }

    async function deleteExp(k) { if(confirm("Biztosan törlöd?")) { showLoading(true); await fetch(`${DB_URL}expenses/${currentUser.name}/${k}.json`, {method:'DELETE'}); await loadData(); openDetails(); renderCalendar(); showLoading(false); } }
    async function addUser() {
        const n = document.getElementById('new-user-name').value, p = document.getElementById('new-user-pass').value;
        if(!n || !p) return;
        showLoading(true);
        await fetch(`${DB_URL}users_auth/${n}.json`, { method: 'PUT', body: JSON.stringify(p) });
        alert("Kész!"); closeModal('admin-modal'); showLoading(false);
    }
    if(currentUser) initApp();
</script>
</body>
</html>
