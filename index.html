<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Munkaidő PRO - Szinkronizált</title>
    <style>
        :root {
            --bg: #000000; --card: #121212; --text: #ffffff;
            --accent: #007aff; --border: #2c2c2e; --secondary: #8e8e93;
            --danger: #ff453a; --success: #30d158;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.8); text-align: center; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        input { width: 100%; background: #1c1c1e; border: 1px solid var(--border); padding: 15px; border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        .main-btn { display: flex; align-items: center; justify-content: center; background: #1c1c1e; color: white; padding: 20px; margin: 12px auto; border: 1px solid var(--border); border-radius: 18px; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .main-btn:active { transform: scale(0.98); background: #2c2c2e; }
        .accent-btn { background: var(--accent); }

        .nav-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; background: #1c1c1e; padding: 10px 15px; border-radius: 14px; border: 1px solid var(--border); }
        .nav-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; }

        .calendar-grid { display: grid; grid-template-columns: 40px repeat(7, 1fr); gap: 6px; margin: 15px 0; }
        .grid-header { font-size: 11px; font-weight: bold; color: var(--accent); text-align: center; }
        .week-num { font-size: 10px; color: var(--secondary); align-self: center; text-align: center; }
        
        .day-cell { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1c1c1e; min-height: 65px; border-radius: 12px; font-size: 14px; border: 1px solid #2c2c2e;
        }
        .day-val { font-size: 10px; font-weight: bold; color: var(--success); margin-top: 4px; }

        .summary-section { 
            background: #1c1c1e; padding: 15px; border-radius: 20px; border: 1px solid var(--border); 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left;
        }
        .sum-full { grid-column: span 2; border-top: 1px solid #2c2c2e; padding-top: 10px; }

        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; }
        #time-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1c1c1e; padding: 25px; border-radius: 24px; width: 85%; max-width: 320px; border: 1px solid var(--border); }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading-overlay">Szinkronizálás...</div>

<div id="login-screen">
    <h1 style="margin-bottom:20px">Munkaidő Belépés</h1>
    <div style="width:100%; max-width:300px">
        <input type="text" id="login-user" placeholder="Felhasználónév">
        <input type="password" id="login-pass" placeholder="Jelszó">
        <button class="main-btn accent-btn" onclick="handleLogin()">BELÉPÉS</button>
    </div>
</div>

<div id="page-main" class="container hidden">
    <div id="user-info" style="font-size:12px; color:var(--secondary); margin-bottom:10px"></div>
    <h1 style="margin-bottom:30px">Munkaidő</h1>
    <button class="main-btn" onclick="openPage('round15')">⏱️ 15p Kerekítéssel</button>
    <button class="main-btn" onclick="openPage('round30')">⏳ 30p Kerekítéssel</button>
    <button class="main-btn" onclick="openPage('presence')">📅 Jelenlét (✓)</button>
    <button class="main-btn" style="background:none; color:var(--danger); border:none" onclick="logout()">Kijelentkezés</button>
</div>

<div id="page-view" class="container hidden">
    <h2 id="view-title" style="margin:0 0 15px 0"></h2>
    <div class="nav-row">
        <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
        <span id="month-display" style="font-weight:bold"></span>
        <button class="nav-btn" onclick="changeMonth(1)">❯</button>
    </div>
    <div class="calendar-grid" id="calendar-body"></div>
    
    <div class="summary-section">
        <div class="sum-box">
            <span id="label-wage" style="font-size:10px; color:var(--secondary)">ÓRABÉR</span>
            <input type="text" id="wage-input" style="margin-top:5px; padding:8px" placeholder="0" oninput="formatCurrency(this); saveWages();">
        </div>
        <div class="sum-box">
            <span id="label-total" style="font-size:10px; color:var(--secondary)">ÖSSZES ÓRA</span>
            <div id="total-count" style="font-size: 20px; font-weight: bold; margin-top:5px">0</div>
        </div>
        <div class="sum-box sum-full">
            <span style="font-size:10px; color:var(--secondary)">VÁRHATÓ FIZETÉS</span>
            <div id="total-money" style="font-size: 24px; font-weight: bold; color: var(--success);">0 Ft</div>
        </div>
    </div>
    <button class="main-btn" style="margin-top:20px" onclick="backToMenu()">Vissza a menübe</button>
</div>

<div id="time-modal">
    <div class="modal-content">
        <h3 id="modal-date"></h3>
        <input type="text" id="start-time" inputmode="numeric" placeholder="Érkezés (08:00)" maxlength="5" onkeyup="timeMask(this)">
        <input type="text" id="end-time" inputmode="numeric" placeholder="Távozás (16:30)" maxlength="5" onkeyup="timeMask(this)">
        <div style="display:flex; justify-content:space-between; align-items:center; margin:15px 0">
            <span>Ebédidő (-30p)</span>
            <input type="checkbox" id="break-toggle" style="width:25px; height:25px">
        </div>
        <button class="main-btn accent-btn" onclick="saveTime()">MENTÉS</button>
        <button class="main-btn" style="background:none; border:none; color:var(--danger)" onclick="deleteEntry()">Törlés</button>
        <button class="main-btn" style="background:none; border:none" onclick="closeModal()">Mégse</button>
    </div>
</div>

<script>
    const DB_URL = "https://kiadaskoveto-2e474-default-rtdb.firebaseio.com/"; // Ugyanazt az adatbázist használjuk
    let currentUser = JSON.parse(localStorage.getItem('work_session'));
    let workData = {};
    let wages = { 'presence': '0', 'round15': '0', 'round30': '0' };
    let d = new Date();
    let mode = 'presence';
    let selectedDay = null;
    const months = ["Január", "Február", "Március", "Április", "Május", "Június", "Július", "Augusztus", "Szeptember", "Október", "November", "December"];

    // Vissza gomb kezelés (S7 FE és Note 20)
    window.addEventListener('popstate', function() {
        if (!document.getElementById('page-main').classList.contains('hidden')) return;
        backToMenu(true);
    });

    async function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        if(!u || !p) return;
        
        showLoading(true);
        try {
            const res = await fetch(`${DB_URL}users_auth/${u}.json`);
            let storedPass = await res.json();
            if(storedPass && String(storedPass).replace(/"/g, '') === String(p)) {
                currentUser = { name: u };
                localStorage.setItem('work_session', JSON.stringify(currentUser));
                initApp();
            } else { alert("Hibás adatok!"); }
        } catch(e) { alert("Hiba a csatlakozáskor!"); }
        showLoading(false);
    }

    async function initApp() {
        if(!currentUser) return;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('page-main').classList.remove('hidden');
        document.getElementById('user-info').innerText = `Bejelentkezve: ${currentUser.name}`;
        await loadRemoteData();
    }

    async function loadRemoteData() {
        showLoading(true);
        const res = await fetch(`${DB_URL}work_data/${currentUser.name}.json`);
        const data = await res.json();
        if(data) {
            workData = data.entries || {};
            wages = data.wages || { 'presence': '0', 'round15': '0', 'round30': '0' };
        }
        showLoading(false);
    }

    async function syncData() {
        if(!currentUser) return;
        await fetch(`${DB_URL}work_data/${currentUser.name}.json`, {
            method: 'PUT',
            body: JSON.stringify({ entries: workData, wages: wages })
        });
    }

    function openPage(m) {
        mode = m;
        history.pushState({page: 'view'}, '');
        document.getElementById('page-main').classList.add('hidden');
        document.getElementById('page-view').classList.remove('hidden');
        
        if(mode === 'presence') {
            document.getElementById('view-title').innerText = "Jelenléti ív";
            document.getElementById('label-wage').innerText = "NAPI FIZETÉS";
            document.getElementById('label-total').innerText = "NAPOK";
        } else {
            document.getElementById('view-title').innerText = "Munkaidő napló";
            document.getElementById('label-wage').innerText = "ÓRABÉR";
            document.getElementById('label-total').innerText = "ÓRÁK";
        }
        document.getElementById('wage-input').value = wages[mode] || 0;
        render();
    }

    function backToMenu(fromPop = false) {
        document.getElementById('page-view').classList.add('hidden');
        document.getElementById('page-main').classList.remove('hidden');
        if(!fromPop) history.back();
    }

    async function saveWages() {
        wages[mode] = document.getElementById('wage-input').value;
        await syncData();
        calculateTotal();
    }

    function dayClick(day) {
        selectedDay = day;
        let key = `${mode}_${d.getFullYear()}_${d.getMonth()}_${day}`;
        if(mode === 'presence') {
            workData[key] = workData[key] ? null : 1;
            syncData().then(render);
        } else {
            let entry = workData[key] || {};
            document.getElementById('modal-date').innerText = `${months[d.getMonth()]} ${day}.`;
            document.getElementById('start-time').value = entry.start || "";
            document.getElementById('end-time').value = entry.end || "";
            document.getElementById('break-toggle').checked = entry.hasBreak || false;
            document.getElementById('time-modal').style.display = 'flex';
        }
    }

    async function saveTime() {
        let s = document.getElementById('start-time').value, e = document.getElementById('end-time').value;
        let hasBreak = document.getElementById('break-toggle').checked;
        let key = `${mode}_${d.getFullYear()}_${d.getMonth()}_${selectedDay}`;

        if (s.includes(':') && e.includes(':')) {
            let sP = s.split(':'), eP = e.split(':');
            let m = (parseInt(eP[0])*60 + parseInt(eP[1])) - (parseInt(sP[0])*60 + parseInt(sP[1]));
            if (hasBreak) m -= 30;
            if (m > 0) {
                let step = mode === 'round15' ? 15 : 30;
                let hrs = Math.floor(m / 60), mins = m % 60;
                if(step === 15) {
                    if(mins >= 53) { hrs++; mins=0; } else if(mins >= 38) mins=45; else if(mins >= 23) mins=30; else if(mins >= 8) mins=15; else mins=0;
                } else {
                    if(mins >= 46) { hrs++; mins=0; } else if(mins >= 16) mins=30; else mins=0;
                }
                workData[key] = { start: s, end: e, total: ((hrs * 60 + mins) / 60).toFixed(2), hasBreak: hasBreak };
            }
        }
        await syncData();
        closeModal();
        render();
    }

    async function deleteEntry() {
        delete workData[`${mode}_${d.getFullYear()}_${d.getMonth()}_${selectedDay}`];
        await syncData();
        closeModal();
        render();
    }

    // --- SEGÉDFÜGGVÉNYEK (Render, Mask, etc.) ---
    function render() {
        document.getElementById('month-display').innerText = `${d.getFullYear()}. ${months[d.getMonth()]}`;
        const body = document.getElementById('calendar-body');
        body.innerHTML = '<div class="grid-header"></div>' + ["H", "K", "Sze", "Cs", "P", "Szo", "V"].map(h => `<div class="grid-header">${h}</div>`).join('');
        let firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
        let lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0);
        let startShift = (firstDay.getDay() + 6) % 7;
        let dateCounter = 1;

        for (let row = 0; row < 6; row++) {
            if (dateCounter > lastDay.getDate()) break;
            let dateObj = new Date(d.getFullYear(), d.getMonth(), dateCounter);
            body.innerHTML += `<div class="week-num">${getWeekNum(dateObj)}</div>`;
            for (let col = 0; col < 7; col++) {
                if ((row === 0 && col < startShift) || dateCounter > lastDay.getDate()) {
                    body.innerHTML += `<div></div>`;
                } else {
                    let key = `${mode}_${d.getFullYear()}_${d.getMonth()}_${dateCounter}`;
                    let entry = workData[key];
                    let display = "";
                    if(mode === 'presence') display = entry ? "✓" : "";
                    else if (entry) display = entry.total + "ó";
                    body.innerHTML += `<div class="day-cell" onclick="dayClick(${dateCounter})">${dateCounter}<div class="day-val">${display}</div></div>`;
                    dateCounter++;
                }
            }
        }
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0, prefix = `${mode}_${d.getFullYear()}_${d.getMonth()}_`;
        for(let k in workData) { 
            if(k.startsWith(prefix) && workData[k]) {
                total += (mode === 'presence' ? 1 : parseFloat(workData[k].total || 0));
            }
        }
        document.getElementById('total-count').innerText = mode==='presence' ? total : total.toFixed(2);
        let w = parseInt(document.getElementById('wage-input').value.replace(/\s/g, "")) || 0;
        document.getElementById('total-money').innerText = Math.round(total * w).toLocaleString('hu-HU') + " Ft";
    }

    function timeMask(i) { let v = i.value.replace(/\D/g, ""); if (v.length > 2) i.value = v.substring(0, 2) + ":" + v.substring(2, 4); else i.value = v; }
    function formatCurrency(i) { i.value = i.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, " "); }
    function changeMonth(n) { d.setMonth(d.getMonth() + n); render(); }
    function showLoading(s) { document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none'; }
    function closeModal() { document.getElementById('time-modal').style.display = 'none'; }
    function logout() { localStorage.removeItem('work_session'); location.reload(); }
    function getWeekNum(date) {
        let t = new Date(date.valueOf()); t.setDate(t.getDate() - ((date.getDay() + 6) % 7) + 3);
        let f = t.valueOf(); t.setMonth(0, 1);
        if (t.getDay() !== 4) t.setMonth(0, 1 + ((4 - t.getDay()) + 7) % 7);
        return 1 + Math.ceil((f - t) / 604800000);
    }

    if(currentUser) initApp();
</script>
</body>
</html>
